<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Growth Dashboard — BrightFoundry</title>
    <link rel="stylesheet" href="growth.css" />
</head>

<body>

    <!-- Global Navigation -->
    <nav class="bf-nav">
        <div class="nav-left">
            <a href="../index.html" class="nav-logo">BrightFoundry</a>
        </div>
        <div class="nav-right">
            <a href="../index.html#modules">Modules</a>
            <a href="../index.html#contact">Contact</a>
        </div>
    </nav>

    <header class="dashboard-header">
        <h1>Your Growth Dashboard</h1>

            <div id="reflections-list" class="reflections-list">

    <footer class="bf-footer">
        <p>BrightFoundry — Growing brighter minds.</p>
    </footer>

    <script src="growth.js"></script>
