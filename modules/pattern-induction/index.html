<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pattern Induction — BrightFoundry</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <header class="module-header">
        <h1>Pattern Induction</h1>
        <p>Discover hidden rules, structures, and relationships.</p>
    </header>

    <main class="module-container">

        <div class="pattern-box">
            <h2>Identify the Pattern</h2>
            <p id="sequence-display">Loading...</p>
        </div>

        <div class="input-area">
            <label for="user-answer">What comes next?</label>
            <input type="text" id="user-answer" placeholder="Enter your answer" />
            <button id="submit-btn">Submit</button>
        </div>

        <p id="feedback"></p>

        <button id="next-btn" class="hidden">Next Pattern</button>

    </main>

    <script src="logic.js"></script>
</body>
</html>
